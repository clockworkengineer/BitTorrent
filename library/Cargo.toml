[package]
name = "bittorrent-rs"
version = "0.1.0"
edition = "2024"

[features]
default = ["std", "http-tracker", "dht", "lsd", "utp", "nat-pmp", "mse", "webseed", "v2"]
std = [
    "dep:rand",
    "dep:url",
    "dep:futures",
    "futures?/executor",
    "futures?/std",
]
ureq-http = [
    "dep:ureq",
    "dep:urlencoding",
]
http-tracker = [
    "std",
    "ureq-http",
]
dht = []
lsd = []
utp = []
nat-pmp = []
mse = ["dep:crypto-bigint"]
webseed = ["std", "ureq-http"]
v2 = ["dep:sha2"]

[dependencies]
sha1 = { version = "0.11.0", default-features = false }
sha2 = { version = "0.10.8", default-features = false, optional = true }
crypto-bigint = { version = "0.5", default-features = false, optional = true }
rand = { version = "0.8", optional = true }
ureq = { version = "2.7", optional = true }
urlencoding = { version = "2.1", optional = true }
url = { version = "2.4", optional = true }
futures = { version = "0.3", default-features = false, features = ["alloc"], optional = true }
